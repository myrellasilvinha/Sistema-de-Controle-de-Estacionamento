<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/cadastrarVeiculo.js"></script>
    <title>Cadastrar Veículo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Cadastro de Veículo</h2>
        <form>
            <div class="form">
                Placa: <input type="text" id="placa"><br><br>
            </div>
            <div class="form">
                Modelo: <input type="text" id="modelo"><br><br>
            </div>
            <div class="form">
                Cor: <input type="text" id="cor"><br><br>
            </div>
            <div class="form">
                Proprietário: <input type="text" id="proprietario"><br><br>
            </div>
            <button class="salvar-form" onclick="salvar()">Salvar</button>
        </form>
    </div>
    <div class="return">
        <a href="index.html">Voltar</a>
    </div>
</body>
</html>
